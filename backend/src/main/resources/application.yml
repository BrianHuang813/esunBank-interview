spring:
  application:
    name: library-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/library?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Taipei}
    username: ${MYSQL_USER:library_app}
    password: ${MYSQL_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Taipei

server:
  port: ${BACKEND_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

logging:
  level:
    root: INFO
    com.esunbank.library: INFO
