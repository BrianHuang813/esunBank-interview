spring:
  application:
    name: library-api
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/library?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Taipei}
    username: ${MYSQL_USER:library_app}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Taipei

server:
  port: ${BACKEND_PORT:8080}
  forward-headers-strategy: native
  error:
    include-message: never
    include-stacktrace: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  login-protection:
    account-max-failures: ${LOGIN_ACCOUNT_MAX_FAILURES:5}
    account-window: ${LOGIN_ACCOUNT_WINDOW:15m}
    account-lock-duration: ${LOGIN_ACCOUNT_LOCK_DURATION:15m}
    ip-max-failures: ${LOGIN_IP_MAX_FAILURES:20}
    ip-window: ${LOGIN_IP_WINDOW:1m}
    max-tracked-keys: ${LOGIN_MAX_TRACKED_KEYS:10000}

logging:
  level:
    root: INFO
    com.esunbank.library: INFO
